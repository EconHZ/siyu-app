<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#f8f5f2" />
<title>私语</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
body.theme-day {
  --bg: #f8f5f2; --surface: #ffffff; --surface2: #f0ecf8;
  --border: #e0d8f0; --accent: #7c5cbf; --accent2: #9b7dd4;
  --accent-light: #ede8f8; --text: #1a1525; --text2: #5a4e72;
  --text3: #a89dc0; --danger: #c4675a;
  --card-shadow: 0 2px 16px rgba(124,92,191,0.08);
  --header-bg: rgba(248,245,242,0.92);
}
body.theme-night {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28;
  --border: #2a2a3a; --accent: #c8813e; --accent2: #a86830;
  --accent-light: #2a1f10; --text: #f0e8dc; --text2: #9a8878;
  --text3: #5a5248; --danger: #c4675a;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
  --header-bg: rgba(10,10,15,0.92);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif;
  min-height: 100vh; max-width: 480px; margin: 0 auto; overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
button, input, textarea { font-family: inherit; }
.header {
  position: sticky; top: 0; z-index: 100; background: var(--header-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border); padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.3s, border-color 0.3s;
}
.header-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: 0.05em; }
.header-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn-theme, .btn-add {
  border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
.btn-theme { width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 17px; }
.btn-add { width: 38px; height: 38px; background: var(--accent); border: none; color: #fff; font-size: 22px; }
.btn-theme:active, .btn-add:active, .btn:active, .para-add-btn:active { opacity: 0.7; transform: scale(0.96); }
.inner-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.inner-tab { flex: 1; padding: 11px 8px; background: none; border: none; color: var(--text3); font-size: 13px; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; }
.inner-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.inner-panel { padding-bottom: 80px; }
.view { display: none; }
.view.active { display: block; }
.list-container { padding: 16px; }
.empty-state { text-align: center; padding: 80px 24px; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 14px; line-height: 1.8; }
.diary-card, .person-card, .label-card, .settings-card, .style-card {
  background: var(--surface); border: 1px solid var(--border); box-shadow: var(--card-shadow);
}
.diary-card { border-radius: 16px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: transform 0.15s, border-color 0.2s; position: relative; overflow: hidden; animation: fadeUp 0.3s ease both; }
.diary-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity 0.2s; }
.diary-card:active { transform: scale(0.98); }
.diary-card:active::before { opacity: 1; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
.card-person { font-size: 17px; font-weight: 600; color: var(--text); word-break: break-word; }
.card-mood { font-size: 13px; color: var(--accent); flex-shrink: 0; }
.card-meta { font-size: 12px; color: var(--text3); margin-bottom: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
.card-preview { font-size: 14px; color: var(--text2); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-photo { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-top: 10px; }
.card-tags, .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag, .sex-tag-detail { font-size: 11px; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.04em; }
.tag { background: var(--accent-light); color: var(--accent); border: 1px solid var(--border); }
.sex-tag-detail { background: rgba(196,103,90,0.12); color: #c4675a; border: 1px solid rgba(196,103,90,0.3); }
.person-card { border-radius: 14px; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 16px; animation: fadeUp 0.3s ease both; transition: border-color 0.2s, transform 0.15s; }
.person-card:active { transform: scale(0.98); border-color: var(--accent); }
.person-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--accent-light); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; color: var(--accent); font-weight: 600; }
.person-info { flex: 1; min-width: 0; }
.person-name { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.person-meta { font-size: 12px; color: var(--text3); }
.person-count { font-size: 13px; color: var(--accent); font-weight: 600; background: var(--accent-light); padding: 4px 10px; border-radius: 20px; }
.label-card { border-radius: 14px; padding: 16px 20px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; animation: fadeUp 0.3s ease both; }
.label-card:active { transform: scale(0.98); border-color: #c4675a; }
.label-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.label-card-name { font-size: 15px; color: var(--text); font-weight: 600; }
.label-card-count { font-size: 12px; color: #c4675a; background: rgba(196,103,90,0.12); padding: 3px 10px; border-radius: 20px; }
.label-card-preview { font-size: 13px; color: var(--text3); }
.sex-tags-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.sex-tag-chip { padding: 7px 14px; border-radius: 20px; font-size: 13px; border: 1.5px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.2s; }
.sex-tag-chip.selected { border-color: #c4675a; background: rgba(196,103,90,0.12); color: #c4675a; }
.form-container { padding: 20px; padding-bottom: 100px; }
.form-section { margin-bottom: 22px; }
.form-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: block; }
.form-input, .form-textarea, .settings-key-input, .custom-prompt-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-size: 15px; padding: 13px 16px; outline: none; transition: border-color 0.2s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-textarea:focus, .settings-key-input:focus, .custom-prompt-textarea:focus { border-color: var(--accent2); }
.mood-row { display: flex; align-items: center; gap: 14px; }
.mood-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: var(--border); outline: none; }
.mood-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.tags-input-row { display: flex; gap: 8px; }
.tags-input-row .form-input { flex: 1; }
.btn-tag-add { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--accent); padding: 0 16px; font-size: 20px; cursor: pointer; flex-shrink: 0; }
.tags-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.tag-item { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 12px; border-radius: 20px; background: var(--accent-light); color: var(--accent); border: 1px solid var(--border); }
.tag-remove { cursor: pointer; opacity: 0.6; font-size: 14px; }
.para-blocks { display: flex; flex-direction: column; gap: 12px; }
.para-block, .para-block-photo, .para-block-audio { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
.para-block:focus-within { border-color: var(--accent2); }
.para-block-header, .para-block-photo-header, .para-block-audio-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px 0; }
.para-block-photo-header, .para-block-audio-header { padding: 10px 14px; }
.para-block-num { font-size: 11px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; }
.para-block-actions { display: flex; gap: 6px; }
.para-action-btn { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text3); padding: 2px 4px; border-radius: 6px; }
.para-action-btn.danger:hover { color: var(--danger); }
.para-textarea { width: 100%; background: transparent; border: none; color: var(--text); font-size: 15px; padding: 8px 14px 12px; outline: none; resize: none; line-height: 1.85; min-height: 80px; display: block; }
.para-ai-bar { border-top: 1px solid var(--border); padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.para-char-count { font-size: 11px; color: var(--text3); flex-shrink: 0; }
.para-char-count.over { color: var(--danger); }
.btn-para-ai { display: flex; align-items: center; gap: 5px; background: var(--accent-light); border: 1px solid var(--border); border-radius: 20px; color: var(--accent); font-size: 12px; padding: 5px 12px; cursor: pointer; flex-shrink: 0; }
.btn-para-ai:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-para-ai .mini-spinner { width: 11px; height: 11px; border: 1.5px solid var(--accent2); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.btn-para-ai.loading .mini-spinner { display: block; }
.para-type-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.para-add-btn { flex: 1; min-width: 80px; padding: 13px; background: var(--surface2); border: 1px dashed var(--border); border-radius: 12px; color: var(--text3); font-size: 12px; cursor: pointer; transition: all 0.2s; }
.para-block-photo-placeholder { width: 100%; padding: 32px; text-align: center; color: var(--text3); font-size: 13px; cursor: pointer; border-top: 1px solid var(--border); }
.audio-player-wrap { padding: 8px 14px 14px; }
.audio-player-wrap audio { width: 100%; }
.audio-rec-bar { padding: 12px 14px; display: flex; align-items: center; gap: 12px; border-top: 1px solid var(--border); }
.rec-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #c4675a; color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rec-btn.recording { background: #888; animation: pulse 1s infinite; }
.rec-timer { font-size: 13px; color: var(--text3); min-width: 40px; }
.bottom-bar, .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 100; }
.bottom-bar { padding: 12px 20px; display: flex; gap: 10px; }
.btn { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 14px; cursor: pointer; transition: opacity 0.2s, transform 0.15s; letter-spacing: 0.05em; }
.btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.tab-bar { display: flex; }
.tab-item { flex: 1; padding: 12px 0 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; border: none; background: none; color: var(--text3); font-size: 10px; letter-spacing: 0.05em; transition: color 0.2s; }
.tab-item.active { color: var(--accent); }
.tab-icon { font-size: 20px; }
.detail-container { padding: 24px 20px; padding-bottom: 120px; }
.detail-person { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 6px; }
.detail-meta { font-size: 13px; color: var(--text3); margin-bottom: 16px; display: flex; gap: 14px; flex-wrap: wrap; }
.detail-mood { font-size: 14px; color: var(--accent); margin-bottom: 16px; }
.detail-para { font-size: 15px; line-height: 2; color: var(--text2); white-space: pre-wrap; border-left: 2px solid var(--border); padding-left: 16px; margin-bottom: 16px; }
.detail-para-photo { width: 100%; border-radius: 12px; margin-bottom: 16px; display: block; }
.settings-container { padding: 24px 20px; padding-bottom: 100px; }
.settings-section-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin: 28px 0 12px; }
.settings-section-title:first-child { margin-top: 0; }
.settings-card { border-radius: 14px; overflow: hidden; }
.settings-row { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
.settings-row-body { flex: 1; min-width: 0; }
.settings-row-label { font-size: 14px; color: var(--text); margin-bottom: 2px; }
.settings-row-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.settings-input-wrap { margin-top: 10px; position: relative; }
.settings-key-input { background: var(--surface2); font-family: monospace; font-size: 13px; padding: 11px 40px 11px 14px; }
.settings-key-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text3); }
.settings-save-btn { margin-top: 10px; width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.api-status { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; margin-top: 8px; }
.api-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.api-dot.green { background: #5baa6f; }
.api-dot.red { background: var(--danger); }
.api-dot.grey { background: var(--text3); }
.provider-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; width: 100%; }
.provider-card { border: 2px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; gap: 8px; }
.provider-card.active { border-color: var(--accent); background: var(--accent-light); }
.provider-logo { font-size: 18px; flex-shrink: 0; }
.provider-name { font-size: 13px; color: var(--text); font-weight: 600; }
.provider-card.active .provider-name { color: var(--accent); }
.style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.style-card { border-width: 2px; border-radius: 14px; padding: 16px 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; text-align: left; }
.style-card.active { border-color: var(--accent); background: var(--accent-light); }
.style-card.custom-card { grid-column: 1 / -1; }
.style-card-icon { font-size: 24px; margin-bottom: 8px; }
.style-card-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.style-card-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.style-card.active .style-card-name { color: var(--accent); }
.custom-prompt-wrap { margin-top: 12px; display: none; }
.custom-prompt-wrap.show { display: block; }
.custom-prompt-textarea { background: var(--surface2); font-size: 13px; resize: vertical; min-height: 90px; line-height: 1.7; }
.custom-prompt-save { margin-top: 8px; width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
#export-canvas { position: fixed; left: -9999px; top: 0; width: 750px; padding: 60px 50px; font-family: 'Noto Serif SC', serif; }
body.theme-day #export-canvas { background: #ffffff; color: #1a1525; }
body.theme-night #export-canvas { background: #0d0d14; color: #f0e8dc; }
.ec-app-name { font-family: 'DM Serif Display', serif; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 20px; color: #a89dc0; }
body.theme-night .ec-app-name { color: #5a5248; }
.ec-person { font-family: 'DM Serif Display', serif; font-size: 42px; margin-bottom: 10px; }
.ec-meta { font-size: 13px; display: flex; gap: 20px; margin-bottom: 30px; color: #a89dc0; }
body.theme-night .ec-meta { color: #5a5248; }
.ec-header-line { height: 1px; margin-bottom: 30px; background: #e0d8f0; }
body.theme-night .ec-header-line { background: #2a2a3a; }
.ec-mood-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
.ec-mood-label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #a89dc0; }
body.theme-night .ec-mood-label { color: #5a5248; }
.ec-mood-track { flex: 1; height: 3px; border-radius: 2px; background: #e0d8f0; }
body.theme-night .ec-mood-track { background: #2a2a3a; }
.ec-mood-fill { height: 100%; border-radius: 2px; background: #7c5cbf; }
body.theme-night .ec-mood-fill { background: #c8813e; }
.ec-mood-num { font-size: 13px; color: #7c5cbf; }
body.theme-night .ec-mood-num { color: #c8813e; }
.ec-divider { width: 40px; height: 1px; margin: 0 0 30px 0; opacity: 0.6; background: #7c5cbf; }
body.theme-night .ec-divider { background: #c8813e; }
.ec-photo { width: 100%; border-radius: 12px; margin-bottom: 30px; display: block; }
.ec-body { font-size: 16px; line-height: 2.2; white-space: pre-wrap; margin-bottom: 30px; color: #5a4e72; }
body.theme-night .ec-body { color: #9a8878; }
.ec-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 50px; }
.ec-tag { font-size: 12px; padding: 5px 16px; border-radius: 20px; letter-spacing: 0.05em; border: 1px solid #e0d8f0; color: #a89dc0; }
body.theme-night .ec-tag { border-color: #2a2a3a; color: #5a5248; }
.ec-footer { padding-top: 24px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f0ecf8; }
body.theme-night .ec-footer { border-top-color: #1c1c28; }
.ec-footer-date, .ec-footer-logo { font-size: 12px; letter-spacing: 0.1em; color: #c8bfe0; }
body.theme-night .ec-footer-date, body.theme-night .ec-footer-logo { color: #3a3830; }
.ec-footer-logo { font-family: 'DM Serif Display', serif; font-style: italic; }
.speech-overlay, .loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.speech-overlay.show, .loading-overlay.show { opacity: 1; pointer-events: all; }
.speech-mic { font-size: 64px; animation: pulse 1s infinite; margin-bottom: 16px; }
.speech-hint { color: #fff; font-size: 14px; margin-bottom: 24px; letter-spacing: 0.1em; }
.speech-stop { padding: 12px 32px; background: #c4675a; color: #fff; border: none; border-radius: 30px; font-size: 15px; cursor: pointer; }
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 11px 22px; border-radius: 30px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; box-shadow: var(--card-shadow); max-width: calc(100% - 32px); overflow: hidden; text-overflow: ellipsis; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.loading-overlay { background: rgba(0,0,0,0.55); }
.spinner { width: 36px; height: 36px; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px; }
.loading-text { font-size: 13px; color: #fff; letter-spacing: 0.1em; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
</style>
</head>
<body class="theme-day">
  <div class="view active" id="view-list">
    <div class="header">
      <div><div class="header-title">私语</div><div class="header-sub">Dating Journal</div></div>
      <div class="header-right"><button class="btn-theme" onclick="toggleTheme()">☀️</button><button class="btn-add" onclick="showView('form')">+</button></div>
    </div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const DB_NAME = 'siyu_db', STORE = 'entries', DB_VER = 1;
const DEFAULT_SEX_TAGS = ['亲吻', '口交', '性交', 'BDSM', '户外'];
let db = null, currentId = null, currentTags = [], editingId = null;
let paragraphs = [{ type: 'text', content: '' }];
let currentSexTags = [];
let currentInnerTab = 'timeline';
let currentTheme = localStorage.getItem('siyu_theme') || 'day';
let mediaRecorder = null, audioChunks = [], recordingIdx = -1, recTimer = null, recSeconds = 0;
let speechRecognition = null, speechTargetIdx = -1;
const moodEmoji = m => ['', '😐', '🙂', '😊', '🥰', '✨'][Number(m)] || '';

function escHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escJs(s) { return String(s ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, ''); }
function showToast(msg) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2600); }
function countChars(s) { return (s || '').replace(/\s/g, '').length; }
function todayStr() { return new Date().toISOString().slice(0,10); }

function applyTheme(t) {
  document.body.className = 'theme-' + t;
  const icon = t === 'day' ? '☀️' : '🌙';
  document.querySelectorAll('.btn-theme').forEach(b => b.textContent = icon);
  document.querySelector('meta[name=theme-color]').setAttribute('content', t === 'day' ? '#f8f5f2' : '#0a0a0f');
}
function toggleTheme() { currentTheme = currentTheme === 'day' ? 'night' : 'day'; localStorage.setItem('siyu_theme', currentTheme); applyTheme(currentTheme); }

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db2 = e.target.result;
      if (!db2.objectStoreNames.contains(STORE)) db2.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e.target.error);
  });
}
function dbGetAll() {
  return new Promise((res, rej) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result.sort((a,b) => String(b.date || '').localeCompare(String(a.date || '')) || (b.createdAt || 0) - (a.createdAt || 0)));
    req.onerror = e => rej(e.target.error);
  });
}
function dbGet(id) {
  return new Promise((res, rej) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
    req.onsuccess = () => res(req.result || null);
    req.onerror = e => rej(e.target.error);
  });
}
function dbPut(entry) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(entry);
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}
function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const view = $('view-' + name); if (view) view.classList.add('active');
  window.scrollTo(0, 0);
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (name === 'list') {
    document.querySelectorAll('.tab-item').forEach(t => { if(t.textContent.includes('日记')) t.classList.add('active'); });
    switchInnerTab(currentInnerTab);
  }
  if (name === 'settings') {
    document.querySelectorAll('.tab-item').forEach(t => { if(t.textContent.includes('设置')) t.classList.add('active'); });
    loadApiKeyStatus(); renderStyleGrid(); renderProviderGrid();
  }
  if (name === 'form') {
    editingId = null; $('form-title').textContent = '新记录'; $('form-sub').textContent = 'New Entry'; initForm();
  }
}
function switchInnerTab(tab) {
  currentInnerTab = tab;
  document.querySelectorAll('.inner-tab').forEach(t => t.classList.remove('active'));
  const itab = $('itab-' + tab); if (itab) itab.classList.add('active');
  document.querySelectorAll('.inner-panel').forEach(p => p.style.display = 'none');
  const panel = $('panel-' + tab); if (panel) panel.style.display = 'block';
  if (!db) return;
  if (tab === 'timeline') renderList();
  if (tab === 'persons') renderPersons();
  if (tab === 'labels') renderLabels();
}

function initForm() {
  currentTags = []; currentSexTags = []; paragraphs = [{ type: 'text', content: '' }];
  $('f-date').value = todayStr(); $('f-location').value = ''; $('f-person').value = '';
  $('f-mood').value = 3; $('mood-val').textContent = '3'; $('f-tag-input').value = '';
  $('tags-list').innerHTML = ''; $('para-photo-input').value = '';
  renderSexTagsGrid(); renderParagraphs();
}
function renderSexTagsGrid() {
  const grid = $('sex-tags-grid'); if (!grid) return;
  grid.innerHTML = DEFAULT_SEX_TAGS.map(t => `<button type="button" class="sex-tag-chip ${currentSexTags.includes(t) ? 'selected' : ''}" onclick="toggleSexTag('${escJs(t)}')">${escHtml(t)}</button>`).join('');
}
function toggleSexTag(t) {
  currentSexTags = currentSexTags.includes(t) ? currentSexTags.filter(x => x !== t) : [...currentSexTags, t];
  renderSexTagsGrid();
}
function addTag() {
  const input = $('f-tag-input'); const val = input.value.trim(); if (!val) return;
  if (!currentTags.includes(val)) currentTags.push(val);
  input.value = ''; renderFormTags();
}
function removeTag(idx) { currentTags.splice(idx, 1); renderFormTags(); }
function renderFormTags() {
  $('tags-list').innerHTML = currentTags.map((t, i) => `<div class="tag-item">${escHtml(t)}<span class="tag-remove" onclick="removeTag(${i})">×</span></div>`).join('');
}
function syncTextParas() {
  paragraphs.forEach((p, i) => {
    if (p.type === 'text') {
      const ta = $('para-' + i); if (ta) p.content = ta.value;
    }
  });
}
function renderParagraphs() {
  const container = $('para-blocks'); container.innerHTML = '';
  paragraphs.forEach((para, i) => {
    const block = document.createElement('div');
    if (para.type === 'photo') {
      block.className = 'para-block-photo';
      block.innerHTML = `<div class="para-block-photo-header"><span class="para-block-num">照片 ${i + 1}</span><div class="para-block-actions"><button class="para-action-btn danger" onclick="removeParagraph(${i})" title="删除">🗑</button></div></div>${para.content ? `<img src="${para.content}" alt="" style="width:100%;display:block;max-height:260px;object-fit:cover">` : `<div class="para-block-photo-placeholder" onclick="replacePhoto(${i})">📷 点击选择照片</div>`}`;
    } else if (para.type === 'audio') {
      block.className = 'para-block-audio';
      const audioBody = para.content ? `<div class="audio-player-wrap"><audio controls src="${para.content}"></audio></div>` : `<div class="audio-rec-bar"><button class="rec-btn recording" onclick="stopRecording()">■</button><span class="rec-timer" id="rec-timer-${i}">0:00</span><span style="font-size:12px;color:var(--text3)">录音中，点击停止</span></div>`;
      block.innerHTML = `<div class="para-block-audio-header"><span class="para-block-num">🎙️ 录音 ${i + 1}</span><div class="para-block-actions"><button class="para-action-btn danger" onclick="removeParagraph(${i})" title="删除">🗑</button></div></div>${audioBody}`;
    } else {
      block.className = 'para-block';
      block.innerHTML = `<div class="para-block-header"><span class="para-block-num">段落 ${i + 1}</span><div class="para-block-actions">${paragraphs.length > 1 ? `<button class="para-action-btn danger" onclick="removeParagraph(${i})" title="删除段落">🗑</button>` : ''}</div></div><textarea class="para-textarea" id="para-${i}" placeholder="${i === 0 ? '写下今天发生的一切...' : '继续记录...'}" oninput="onParaInput(${i})">${escHtml(para.content)}</textarea><div class="para-ai-bar"><span class="para-char-count" id="char-${i}">${countChars(para.content)} 字</span><button class="btn-para-ai" id="ai-btn-${i}" onclick="aiContinuePara(${i})"><div class="mini-spinner"></div><span class="para-ai-label">✨ AI 续写此段</span></button></div>`;
    }
    container.appendChild(block);
    if (para.type === 'text') setTimeout(() => autoSizeTextarea(i), 0);
  });
}
function autoSizeTextarea(i) { const ta = $('para-' + i); if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; } }
function onParaInput(idx) {
  const ta = $('para-' + idx); if (!ta || !paragraphs[idx]) return;
  paragraphs[idx].content = ta.value; autoSizeTextarea(idx);
  const cc = $('char-' + idx); const n = countChars(ta.value);
  if (cc) { cc.textContent = `${n} 字`; cc.className = 'para-char-count' + (n > 50 ? ' over' : ''); }
}
function addParagraph() {
  syncTextParas(); paragraphs.push({ type: 'text', content: '' }); renderParagraphs();
  setTimeout(() => { const ta = $('para-' + (paragraphs.length - 1)); if (ta) ta.focus(); }, 50);
}
function removeParagraph(idx) {
  syncTextParas(); paragraphs.splice(idx, 1); if (!paragraphs.length) paragraphs.push({ type: 'text', content: '' }); renderParagraphs();
}
function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const max = 1400; let { width, height } = img;
      if (width > max || height > max) { const ratio = Math.min(max / width, max / height); width = Math.round(width * ratio); height = Math.round(height * ratio); }
      const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      cb(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.onerror = () => showToast('图片读取失败'); img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function addPhotoParagraph(e) {
  const file = e.target.files[0]; if (!file) return; syncTextParas();
  compressImage(file, b64 => { paragraphs.push({ type: 'photo', content: b64 }); renderParagraphs(); $('para-photo-input').value = ''; });
}
function replacePhoto(idx) {
  const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => { const file = e.target.files[0]; if (!file) return; compressImage(file, b64 => { paragraphs[idx].content = b64; renderParagraphs(); }); };
  input.click();
}

async function addAudioParagraph() {
  if (!navigator.mediaDevices || !window.MediaRecorder) { showToast('此设备不支持录音'); return; }
  syncTextParas(); const idx = paragraphs.length; paragraphs.push({ type: 'audio', content: '' }); renderParagraphs(); await startRecording(idx);
}
async function startRecording(idx) {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordingIdx = idx; audioChunks = []; recSeconds = 0;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const reader = new FileReader();
      reader.onload = ev => { if (paragraphs[recordingIdx]) paragraphs[recordingIdx].content = ev.target.result; renderParagraphs(); showToast('录音已添加 ✓'); recordingIdx = -1; };
      reader.readAsDataURL(blob); stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    recTimer = setInterval(() => { recSeconds++; const el = $('rec-timer-' + idx); if (el) el.textContent = `${Math.floor(recSeconds / 60)}:${String(recSeconds % 60).padStart(2, '0')}`; }, 1000);
  } catch (e) { removeParagraph(idx); showToast('无法访问麦克风：' + e.message); }
}
function stopRecording() { if (recTimer) clearInterval(recTimer); recTimer = null; if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop(); }

function startSpeechParagraph() {
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRec) { showToast('此浏览器不支持语音识别，请使用 Safari 或 Chrome'); return; }
  syncTextParas(); speechTargetIdx = paragraphs.length; paragraphs.push({ type: 'text', content: '' }); renderParagraphs();
  speechRecognition = new SpeechRec(); speechRecognition.lang = 'zh-CN'; speechRecognition.continuous = true; speechRecognition.interimResults = true;
  speechRecognition.onresult = e => {
    let transcript = ''; for (let i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
    paragraphs[speechTargetIdx].content = transcript; const ta = $('para-' + speechTargetIdx);
    if (ta) { ta.value = transcript; autoSizeTextarea(speechTargetIdx); }
    const cc = $('char-' + speechTargetIdx); if (cc) cc.textContent = `${countChars(transcript)} 字`;
  };
  speechRecognition.onerror = () => { stopSpeech(false); showToast('语音识别出错'); };
  speechRecognition.onend = () => { $('speech-overlay').classList.remove('show'); };
  speechRecognition.start(); $('speech-overlay').classList.add('show');
}
function stopSpeech(showDone = true) { if (speechRecognition) { try { speechRecognition.stop(); } catch(e){} speechRecognition = null; } $('speech-overlay').classList.remove('show'); if (showDone) showToast('语音转文字完成 ✓'); }

async function saveDiary() {
  const date = $('f-date').value; const person = $('f-person').value.trim();
  if (!date || !person) { showToast('请填写日期和对方昵称'); return; }
  syncTextParas();
  const filtered = paragraphs.filter(p => p.content && (p.type !== 'text' || p.content.trim()));
  const isEdit = !!editingId; const existing = isEdit ? await dbGet(editingId) : null;
  const entry = {
    id: isEdit ? editingId : Date.now().toString(), date, location: $('f-location').value.trim(), person,
    mood: parseInt($('f-mood').value, 10), paragraphs: filtered,

async function exportImage() {
  if (!currentId) return; if (typeof html2canvas === 'undefined') { showToast('长图组件加载失败，请联网后重试'); return; }
  const entry = await dbGet(currentId); if (!entry) { showToast('记录不存在'); return; }
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  let iosWin = null;
  if (isIOS) { iosWin = window.open('', '_blank'); if (!iosWin) { showToast('请在 Safari 设置中允许弹出窗口'); return; } iosWin.document.write('<html><body style="margin:0;background:#111;color:#888;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif">⏳ 正在生成长图...</body></html>'); iosWin.document.close(); }
  $('ec-person').textContent = entry.person; $('ec-date').textContent = `📅 ${entry.date}`; $('ec-location').textContent = entry.location ? `📍 ${entry.location}` : ''; $('ec-mood-fill').style.width = (entry.mood / 5 * 100) + '%'; $('ec-mood-num').textContent = `${entry.mood}/5`; $('ec-footer-date').textContent = entry.date;
  const allTags = [...(entry.tags || []), ...(entry.sexTags || entry.sextags || [])]; $('ec-tags').innerHTML = allTags.map(t => `<span class="ec-tag">${escHtml(t)}</span>`).join('');

  const imageLoadPromises = [];
  paras.forEach(p => {
    if (p.type === 'photo' && p.content) { const img = document.createElement('img'); img.className = 'ec-photo'; img.src = p.content; img.alt = ''; bodyContainer.appendChild(img); imageLoadPromises.push(new Promise(r => { img.onload = r; img.onerror = r; })); }
    else if (p.type === 'text' && p.content) { const div = document.createElement('div'); div.className = 'ec-body'; div.textContent = p.content; bodyContainer.appendChild(div); }
  });
  await Promise.all(imageLoadPromises); $('loading').classList.add('show');
  try {
    if (document.fonts) await document.fonts.ready; await new Promise(r => setTimeout(r, 300));
    const canvas = await html2canvas($('export-canvas'), { backgroundColor: currentTheme === 'day' ? '#ffffff' : '#0d0d14', scale: 2, useCORS: true, allowTaint: true, logging: false, width: 750, windowWidth: 900 });
    const dataURL = canvas.toDataURL('image/png');
    if (isIOS && iosWin && !iosWin.closed) { iosWin.document.open(); iosWin.document.write(`<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>私语长图</title><style>body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;padding:20px;font-family:sans-serif}img{max-width:100%;border-radius:8px}.hint{color:#888;font-size:13px;margin-top:14px;text-align:center;line-height:1.7}</style></head><body><img src="${dataURL}" alt="私语长图"><p class="hint">长按图片 → 存储到照片</p></body></html>`); iosWin.document.close(); showToast('长按图片保存到相册 ✓'); }
    else { const a = document.createElement('a'); a.href = dataURL; a.download = `私语_${entry.person}_${entry.date}.png`; document.body.appendChild(a); a.click(); document.body.removeChild(a); showToast('长图已下载 ✓'); }
  } catch(err) { console.error(err); if (iosWin && !iosWin.closed) iosWin.close(); showToast('生成失败，请重试'); }
  finally { $('loading').classList.remove('show'); }
}

async function aiContinuePara(idx) {
  const provider = getCurrentProvider(); const apiKey = localStorage.getItem(`siyu_api_key_${provider.id}`) || '';
  if (!apiKey) { showToast('请先在设置中填写 API Key'); return; }
  syncTextParas(); const ta = $('para-' + idx); const currentText = paragraphs[idx]?.content || '';
  const btn = $('ai-btn-' + idx); btn.classList.add('loading'); btn.disabled = true;
  const style = getCurrentStyle();
  const systemPrompt = `你是一个私密约会日记续写助手。请用第一人称、自然流畅的中文续写当前段落。严格要求：续写内容不超过50字；直接续写正文，不加标题或说明；不重复已有内容；对方字段是人名代号，不要按字面联想。${style.prompt}`;
  const prevParas = paragraphs.slice(0, idx).filter(p => p.type === 'text' && p.content.trim()).map(p => p.content);
  const userContent = `日期：${$('f-date').value}\n地点：${$('f-location').value.trim() || '未填写'}\n对方：${$('f-person').value.trim() || '未填写'}\n心情：${$('f-mood').value}/5\n标签：${currentTags.join('、') || '无'}\n${prevParas.length ? `前面段落：\n${prevParas.join('\n\n')}\n` : ''}当前段落：\n${currentText || '（空白，请帮我写开头）'}\n\n请续写当前段落，不超过50字：`;
  try {
    const model = localStorage.getItem(`siyu_model_${provider.id}`) || provider.defaultModel; const req = provider.buildRequest(apiKey, model, systemPrompt, userContent);
    const resp = await fetch(req.url, { method: 'POST', headers: req.headers, body: JSON.stringify(req.body) });
    if (!resp.ok) { const err = await resp.json().catch(() => ({})); const msg = err.error?.message || err.message || ''; if (resp.status === 401 || resp.status === 403) { showToast('API Key 无效，请检查'); return; } if (resp.status === 429 || /quota|rate|RESOURCE_EXHAUSTED/i.test(msg)) { showToast('额度已用完，请换模型或稍后再试'); return; } if (resp.status === 404 || /not found|does not exist/i.test(msg)) { showToast('模型名称有误，请在设置中修改'); return; } throw new Error(msg || `HTTP ${resp.status}`); }
    const data = await resp.json(); let continuation = req.extractText(data).trim(); if (!continuation) { showToast('AI 没有返回内容，请重试'); return; }
    if (countChars(continuation) > 50) { let count = 0, cutAt = continuation.length; for (let i = 0; i < continuation.length; i++) { if (!/\s/.test(continuation[i])) count++; if (count >= 50) { cutAt = i + 1; break; } } continuation = continuation.slice(0, cutAt); }
    ta.value = currentText + continuation; paragraphs[idx].content = ta.value; onParaInput(idx); showToast('续写完成 ✓');
  } catch(err) { console.error(err); showToast('续写失败：' + (err.message || '请检查网络')); }
  finally { btn.classList.remove('loading'); btn.disabled = false; }
}
