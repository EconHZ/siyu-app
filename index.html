<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>私语</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
body.theme-day {
  --bg: #f8f5f2;
  --surface: #ffffff;
  --surface2: #f0ecf8;
  --border: #e0d8f0;
  --accent: #7c5cbf;
  --accent2: #9b7dd4;
  --accent-light: #ede8f8;
  --text: #1a1525;
  --text2: #5a4e72;
  --text3: #a89dc0;
  --danger: #c4675a;
  --card-shadow: 0 2px 16px rgba(124,92,191,0.08);
  --header-bg: rgba(248,245,242,0.92);
}
body.theme-night {
  --bg: #0a0a0f;
  --surface: #13131a;
  --surface2: #1c1c28;
  --border: #2a2a3a;
  --accent: #c8813e;
  --accent2: #a86830;
  --accent-light: #2a1f10;
  --text: #f0e8dc;
  --text2: #9a8878;
  --text3: #5a5248;
  --danger: #c4675a;
  --card-shadow: 0 2px 16px rgba(0,0,0,0.3);
  --header-bg: rgba(10,10,15,0.92);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.3s, border-color 0.3s;
}
.header-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: 0.05em; }
.header-sub { font-size: 11px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 10px; }

.btn-theme {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-theme:active { opacity: 0.7; transform: scale(0.92); }

.btn-add {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent); border: none; color: #fff;
  font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.2s; flex-shrink: 0;
}
.btn-add:active { opacity: 0.7; }

/* ── LIST ── */
.list-container { padding: 16px; }
.empty-state { text-align: center; padding: 80px 24px; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
.empty-state p { font-size: 14px; line-height: 1.8; }

.diary-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 20px; margin-bottom: 12px; cursor: pointer;
  box-shadow: var(--card-shadow);
  transition: border-color 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
  animation: fadeUp 0.3s ease both;
}
.diary-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--accent); opacity: 0; transition: opacity 0.2s;
}
.diary-card:active { transform: scale(0.98); }
.diary-card:active::before { opacity: 1; }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.card-person { font-size: 17px; font-weight: 600; color: var(--text); }
.card-mood { font-size: 13px; color: var(--accent); }
.card-meta { font-size: 12px; color: var(--text3); margin-bottom: 8px; display: flex; gap: 10px; flex-wrap: wrap; }
.card-preview {
  font-size: 14px; color: var(--text2); line-height: 1.7;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-photo { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; margin-top: 10px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.tag {
  font-size: 11px; padding: 3px 10px; border-radius: 20px;
  background: var(--accent-light); color: var(--accent);
  border: 1px solid var(--border); letter-spacing: 0.04em;
}

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── FORM ── */
.form-container { padding: 20px; padding-bottom: 100px; }
.form-section { margin-bottom: 22px; }
.form-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; display: block; }
.form-input, .form-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'Noto Serif SC', serif;
  font-size: 15px; padding: 13px 16px; outline: none;
  transition: border-color 0.2s, background 0.3s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-textarea:focus { border-color: var(--accent2); }
.form-textarea { min-height: 160px; resize: vertical; line-height: 1.8; }

.mood-row { display: flex; align-items: center; gap: 14px; }
.mood-slider {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 4px; border-radius: 2px; background: var(--border); outline: none;
}
.mood-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.photo-upload-area {
  border: 2px dashed var(--border); border-radius: 12px; padding: 24px;
  text-align: center; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  color: var(--text3); font-size: 13px;
}
.photo-upload-area:active { border-color: var(--accent); background: var(--accent-light); }
.photo-preview-wrap { position: relative; display: block; }
.photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; display: block; }
.photo-remove {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 50%;
  width: 28px; height: 28px; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#photo-input { display: none; }

.tags-input-row { display: flex; gap: 8px; }
.tags-input-row .form-input { flex: 1; }
.btn-tag-add {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--accent); padding: 0 16px;
  font-size: 20px; cursor: pointer; flex-shrink: 0;
}
.tags-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.tag-item {
  display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 12px;
  border-radius: 20px; background: var(--accent-light); color: var(--accent);
  border: 1px solid var(--border);
}
.tag-remove { cursor: pointer; opacity: 0.6; font-size: 14px; }

/* ── BOTTOM BAR ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--header-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 12px 20px; display: flex; gap: 10px; z-index: 100;
  transition: background 0.3s;
}
.btn {
  flex: 1; padding: 14px; border-radius: 10px; border: none;
  font-family: 'Noto Serif SC', serif; font-size: 14px; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; letter-spacing: 0.05em;
}
.btn:active { opacity: 0.7; transform: scale(0.97); }
.btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

/* ── DETAIL ── */
.detail-container { padding: 24px 20px; padding-bottom: 120px; }
.detail-person { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 6px; }
.detail-meta { font-size: 13px; color: var(--text3); margin-bottom: 16px; display: flex; gap: 14px; flex-wrap: wrap; }
.detail-mood { font-size: 14px; color: var(--accent); margin-bottom: 20px; }
.detail-photo { width: 100%; border-radius: 12px; margin-bottom: 20px; display: block; }
.detail-body {
  font-size: 15px; line-height: 2; color: var(--text2); white-space: pre-wrap;
  border-left: 2px solid var(--border); padding-left: 16px; margin-bottom: 24px;
}
.detail-tags { display: flex; flex-wrap: wrap; gap: 8px; }

/* ── EXPORT CANVAS ── */
#export-canvas {
  position: fixed; left: -9999px; top: 0;
  width: 750px; padding: 60px 50px;
  font-family: 'Noto Serif SC', serif;
}
body.theme-day #export-canvas { background: #ffffff; color: #1a1525; }
body.theme-night #export-canvas { background: #0d0d14; color: #f0e8dc; }

.ec-app-name { font-family: 'DM Serif Display', serif; font-size: 13px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 20px; }
body.theme-day .ec-app-name { color: #a89dc0; }
body.theme-night .ec-app-name { color: #5a5248; }

.ec-person { font-family: 'DM Serif Display', serif; font-size: 42px; margin-bottom: 10px; }
body.theme-day .ec-person { color: #1a1525; }
body.theme-night .ec-person { color: #f0e8dc; }

.ec-meta { font-size: 13px; display: flex; gap: 20px; margin-bottom: 30px; }
body.theme-day .ec-meta { color: #a89dc0; }
body.theme-night .ec-meta { color: #5a5248; }

.ec-header-line { height: 1px; margin-bottom: 30px; }
body.theme-day .ec-header-line { background: #e0d8f0; }
body.theme-night .ec-header-line { background: #2a2a3a; }

.ec-mood-bar { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
.ec-mood-label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
body.theme-day .ec-mood-label { color: #a89dc0; }
body.theme-night .ec-mood-label { color: #5a5248; }

.ec-mood-track { flex: 1; height: 3px; border-radius: 2px; }
body.theme-day .ec-mood-track { background: #e0d8f0; }
body.theme-night .ec-mood-track { background: #2a2a3a; }

.ec-mood-fill { height: 100%; border-radius: 2px; }
body.theme-day .ec-mood-fill { background: #7c5cbf; }
body.theme-night .ec-mood-fill { background: #c8813e; }

.ec-mood-num { font-size: 13px; }
body.theme-day .ec-mood-num { color: #7c5cbf; }
body.theme-night .ec-mood-num { color: #c8813e; }

.ec-divider { width: 40px; height: 1px; margin: 0 0 30px 0; opacity: 0.6; }
body.theme-day .ec-divider { background: #7c5cbf; }
body.theme-night .ec-divider { background: #c8813e; }

.ec-photo { width: 100%; border-radius: 12px; margin-bottom: 30px; display: block; }

.ec-body { font-size: 16px; line-height: 2.2; white-space: pre-wrap; margin-bottom: 40px; }
body.theme-day .ec-body { color: #5a4e72; }
body.theme-night .ec-body { color: #9a8878; }

.ec-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 50px; }
.ec-tag { font-size: 12px; padding: 5px 16px; border-radius: 20px; letter-spacing: 0.05em; }
body.theme-day .ec-tag { border: 1px solid #e0d8f0; color: #a89dc0; }
body.theme-night .ec-tag { border: 1px solid #2a2a3a; color: #5a5248; }

.ec-footer { padding-top: 24px; display: flex; justify-content: space-between; align-items: center; }
body.theme-day .ec-footer { border-top: 1px solid #f0ecf8; }
body.theme-night .ec-footer { border-top: 1px solid #1c1c28; }

.ec-footer-date { font-size: 12px; letter-spacing: 0.1em; }
body.theme-day .ec-footer-date { color: #c8bfe0; }
body.theme-night .ec-footer-date { color: #3a3830; }

.ec-footer-logo { font-family: 'DM Serif Display', serif; font-size: 13px; font-style: italic; }
body.theme-day .ec-footer-logo { color: #c8bfe0; }
body.theme-night .ec-footer-logo { color: #3a3830; }

/* ── SETTINGS VIEW ── */
.settings-container { padding: 24px 20px; padding-bottom: 60px; }
.settings-section-title {
  font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--text3); margin: 28px 0 12px;
}
.settings-section-title:first-child { margin-top: 0; }
.settings-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  box-shadow: var(--card-shadow);
}
.settings-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px; border-bottom: 1px solid var(--border);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
.settings-row-body { flex: 1; min-width: 0; }
.settings-row-label { font-size: 14px; color: var(--text); margin-bottom: 2px; }
.settings-row-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.settings-input-wrap { margin-top: 10px; position: relative; }
.settings-key-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: monospace;
  font-size: 13px; padding: 11px 40px 11px 14px; outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.settings-key-input:focus { border-color: var(--accent2); }
.settings-key-input.valid { border-color: #5baa6f; }
.settings-key-input.invalid { border-color: var(--danger); }
.settings-key-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; font-size: 16px;
  color: var(--text3); padding: 4px;
}
.settings-save-btn {
  margin-top: 10px; width: 100%; padding: 12px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-family: 'Noto Serif SC', serif;
  font-size: 14px; cursor: pointer; transition: opacity 0.2s;
}
.settings-save-btn:active { opacity: 0.7; }
.api-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; margin-top: 8px;
}
.api-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.api-dot.green { background: #5baa6f; }
.api-dot.red { background: var(--danger); }
.api-dot.grey { background: var(--text3); }

/* ── PARAGRAPH BLOCKS ── */
.para-blocks { display: flex; flex-direction: column; gap: 12px; }

.para-block {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  transition: border-color 0.2s;
}
.para-block:focus-within { border-color: var(--accent2); }

.para-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px 0;
}
.para-block-num {
  font-size: 11px; letter-spacing: 0.1em; color: var(--text3);
  text-transform: uppercase;
}
.para-block-actions { display: flex; gap: 6px; }
.para-action-btn {
  background: none; border: none; cursor: pointer;
  font-size: 15px; color: var(--text3); padding: 2px 4px;
  border-radius: 6px; transition: color 0.2s, background 0.15s;
  line-height: 1;
}
.para-action-btn:hover { color: var(--accent); background: var(--accent-light); }
.para-action-btn.danger:hover { color: var(--danger); background: transparent; }

.para-textarea {
  width: 100%; background: transparent; border: none;
  color: var(--text); font-family: 'Noto Serif SC', serif;
  font-size: 15px; padding: 8px 14px 12px; outline: none;
  resize: none; line-height: 1.85; min-height: 80px;
  display: block;
}

.para-ai-bar {
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
}
.para-char-count {
  font-size: 11px; color: var(--text3); flex-shrink: 0;
}
.para-char-count.over { color: var(--danger); }

.btn-para-ai {
  display: flex; align-items: center; gap: 5px;
  background: var(--accent-light); border: 1px solid var(--border);
  border-radius: 20px; color: var(--accent);
  font-family: 'Noto Serif SC', serif; font-size: 12px;
  padding: 5px 12px; cursor: pointer; flex-shrink: 0;
  transition: opacity 0.2s;
}
.btn-para-ai:active { opacity: 0.7; }
.btn-para-ai:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-para-ai .mini-spinner {
  width: 11px; height: 11px;
  border: 1.5px solid var(--accent2);
  border-top-color: transparent;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  display: none;
}
.btn-para-ai.loading .mini-spinner { display: block; }
.btn-para-ai.loading .para-ai-label { opacity: 0.5; }

.para-add-btn {
  width: 100%; padding: 13px;
  background: var(--surface2); border: 1px dashed var(--border);
  border-radius: 12px; color: var(--text3);
  font-family: 'Noto Serif SC', serif; font-size: 13px;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em;
}
.para-add-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* detail paragraphs */
.detail-para {
  font-size: 15px; line-height: 2; color: var(--text2);
  white-space: pre-wrap; border-left: 2px solid var(--border);
  padding-left: 16px; margin-bottom: 16px;
}
.detail-para:last-child { margin-bottom: 24px; }

.para-type-picker { display: flex; gap: 8px; }
.para-type-picker .para-add-btn { flex: 1; }

.para-block-photo {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden;
  transition: border-color 0.2s;
}
.para-block-photo-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
}
.para-block-photo img {
  width: 100%; display: block; max-height: 260px; object-fit: cover;
}
.para-block-photo-placeholder {
  width: 100%; padding: 32px; text-align: center;
  color: var(--text3); font-size: 13px; cursor: pointer;
  border-top: 1px solid var(--border);
}

/* detail photo paragraph */
.detail-para-photo {
  width: 100%; border-radius: 12px; margin-bottom: 16px; display: block;
}

/* ── AI CONTINUE BUTTON ── */
.ai-btn-wrap { margin-top: 10px; }
.btn-ai {
  width: 100%; padding: 13px; border-radius: 10px;
  background: var(--accent-light); border: 1px solid var(--border);
  color: var(--accent); font-family: 'Noto Serif SC', serif;
  font-size: 14px; cursor: pointer; transition: opacity 0.2s, background 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-ai:active { opacity: 0.7; }
.btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }
.ai-spinner {
  width: 14px; height: 14px;
  border: 2px solid var(--accent2);
  border-top-color: transparent;
  border-radius: 50%; animation: spin 0.7s linear infinite;
  display: none;
}
.btn-ai.loading .ai-spinner { display: block; }
.btn-ai.loading .ai-label { opacity: 0.6; }

/* nav tab bar */
.tab-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--header-bg);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  transition: background 0.3s;
}
.tab-item {
  flex: 1; padding: 12px 0 10px; display: flex; flex-direction: column;
  align-items: center; gap: 3px; cursor: pointer; border: none; background: none;
  color: var(--text3); font-family: 'Noto Serif SC', serif;
  font-size: 10px; letter-spacing: 0.05em; transition: color 0.2s;
}
.tab-item.active { color: var(--accent); }
.tab-item:active { opacity: 0.7; }
.tab-icon { font-size: 20px; }

/* ── PROVIDER GRID ── */
.provider-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%;
}
.provider-card {
  border: 2px solid var(--border); border-radius: 10px;
  padding: 10px 12px; cursor: pointer; transition: border-color 0.2s, background 0.2s;
  display: flex; align-items: center; gap: 8px;
}
.provider-card.active { border-color: var(--accent); background: var(--accent-light); }
.provider-card:active { opacity: 0.75; }
.provider-logo { font-size: 18px; flex-shrink: 0; }
.provider-name { font-size: 13px; color: var(--text); font-weight: 600; }
.provider-card.active .provider-name { color: var(--accent); }

/* ── STYLE GRID ── */
.style-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.style-card {
  background: var(--surface); border: 2px solid var(--border);
  border-radius: 14px; padding: 16px 14px; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  text-align: left;
}
.style-card.active {
  border-color: var(--accent);
  background: var(--accent-light);
}
.style-card:active { opacity: 0.8; }
.style-card-icon { font-size: 24px; margin-bottom: 8px; }
.style-card-name {
  font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px;
}
.style-card-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.style-card.active .style-card-name { color: var(--accent); }

.style-card.custom-card { grid-column: 1 / -1; }
.custom-prompt-wrap {
  margin-top: 12px; display: none;
}
.custom-prompt-wrap.show { display: block; }
.custom-prompt-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: 'Noto Serif SC', serif;
  font-size: 13px; padding: 12px 14px; outline: none; resize: vertical;
  min-height: 90px; line-height: 1.7; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.custom-prompt-textarea:focus { border-color: var(--accent2); }
.custom-prompt-save {
  margin-top: 8px; width: 100%; padding: 10px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-family: 'Noto Serif SC', serif;
  font-size: 13px; cursor: pointer; transition: opacity 0.2s;
}
.custom-prompt-save:active { opacity: 0.7; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 11px 22px; border-radius: 30px; font-size: 13px;
  opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 999;
  box-shadow: var(--card-shadow);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── LOADING ── */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.loading-overlay.show { opacity: 1; pointer-events: all; }
.spinner {
  width: 36px; height: 36px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: #fff; letter-spacing: 0.1em; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}
.diary-card:nth-child(1){animation-delay:.04s}
.diary-card:nth-child(2){animation-delay:.08s}
.diary-card:nth-child(3){animation-delay:.12s}
.diary-card:nth-child(4){animation-delay:.16s}
.diary-card:nth-child(5){animation-delay:.20s}
</style>

<script>
'use strict';
// ── THEME ──
let currentTheme = localStorage.getItem('siyu_theme') || 'day';

function applyTheme(t) {
  document.body.className = 'theme-' + t;
  const icon = t === 'day' ? '☀️' : '🌙';
  document.querySelectorAll('.btn-theme').forEach(b => b.textContent = icon);
  document.querySelector('meta[name=theme-color]').setAttribute('content', t === 'day' ? '#f8f5f2' : '#0a0a0f');
}

function toggleTheme() {
  currentTheme = currentTheme === 'day' ? 'night' : 'day';
  localStorage.setItem('siyu_theme', currentTheme);
  applyTheme(currentTheme);
}

applyTheme(currentTheme);

// ── DB ──
const DB_NAME = 'siyu_db', STORE = 'entries', DB_VER = 1;
let db, currentId = null, currentTags = [], editingId = null;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE, { keyPath: 'id' });
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e.target.error);
  });
}

function dbGetAll() {
  return new Promise((res, rej) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => res(req.result.sort((a,b) => b.date.localeCompare(a.date)));
    req.onerror = e => rej(e.target.error);
  });
}

function dbGet(id) {
  return new Promise((res, rej) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
    req.onsuccess = () => res(req.result || null);
    req.onerror = e => rej(e.target.error);
  });
}

function dbPut(entry) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(entry);
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}

function dbDelete(id) {
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}

// ── VIEWS ──
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  window.scrollTo(0, 0);
  // sync tab bar active state
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  if (name === 'list') {
    document.querySelectorAll('.tab-item').forEach(t => { if(t.textContent.includes('日记')) t.classList.add('active'); });
    renderList();
  }
  if (name === 'settings') {
    document.querySelectorAll('.tab-item').forEach(t => { if(t.textContent.includes('设置')) t.classList.add('active'); });
    loadApiKeyStatus();
    renderStyleGrid();
    renderProviderGrid();
  }
  if (name === 'form') {
    editingId = null;
    document.getElementById('form-title').textContent = '新记录';
    document.getElementById('form-sub').textContent = 'New Entry';
    initForm();
  }
}

// ── FORM ──
let paragraphs = []; // [{type:'text'|'photo', content:string}]

function initForm() {
  currentTags = [];
  paragraphs = [{ type: 'text', content: '' }];
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  ['f-location','f-person'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-mood').value = 3;
  document.getElementById('mood-val').textContent = '3';
  document.getElementById('tags-list').innerHTML = '';
  document.getElementById('f-tag-input').value = '';
  document.getElementById('para-photo-input').value = '';
  renderParagraphs();
}

function renderParagraphs() {
  const container = document.getElementById('para-blocks');
  container.innerHTML = '';
  paragraphs.forEach((para, i) => {
    const block = document.createElement('div');
    if (para.type === 'photo') {
      block.className = 'para-block-photo';
      block.innerHTML = `
        <div class="para-block-photo-header">
          <span class="para-block-num">照片 ${i + 1}</span>
          <div class="para-block-actions">
            <button class="para-action-btn danger" onclick="removeParagraph(${i})" title="删除">🗑</button>
          </div>
        </div>
        ${para.content
          ? `<img src="${para.content}" alt="" style="width:100%;display:block;max-height:260px;object-fit:cover">`
          : `<div class="para-block-photo-placeholder" onclick="replacePhoto(${i})">📷 点击选择照片</div>`
        }`;
    } else {
      block.className = 'para-block';
      block.innerHTML = `
        <div class="para-block-header">
          <span class="para-block-num">段落 ${i + 1}</span>
          <div class="para-block-actions">
            ${paragraphs.length > 1 ? `<button class="para-action-btn danger" onclick="removeParagraph(${i})" title="删除段落">🗑</button>` : ''}
          </div>
        </div>
        <textarea class="para-textarea" id="para-${i}"
          placeholder="${i === 0 ? '写下今天发生的一切...' : '继续记录...'}"
          oninput="onParaInput(${i})"
        >${escHtml(para.content)}</textarea>
        <div class="para-ai-bar">
          <span class="para-char-count" id="char-${i}">${countChars(para.content)} 字</span>
          <button class="btn-para-ai" id="ai-btn-${i}" onclick="aiContinuePara(${i})">
            <div class="mini-spinner"></div>
            <span class="para-ai-label">✨ AI 续写此段</span>
          </button>
        </div>`;
    }
    container.appendChild(block);
    if (para.type === 'text') {
      setTimeout(() => {
        const ta = document.getElementById(`para-${i}`);
        if (ta) { ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; }
      }, 0);
    }
  });
}

function countChars(s) {
  return (s || '').replace(/\s/g, '').length;
}

function onParaInput(idx) {
  const ta = document.getElementById(`para-${idx}`);
  paragraphs[idx].content = ta.value;
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
  const cc = document.getElementById(`char-${idx}`);
  const n = countChars(ta.value);
  cc.textContent = `${n} 字`;
  cc.className = 'para-char-count' + (n > 50 ? ' over' : '');
}

function syncTextParas() {
  paragraphs.forEach((p, i) => {
    if (p.type === 'text') {
      const ta = document.getElementById(`para-${i}`);
      if (ta) p.content = ta.value;
    }
  });
}

function addParagraph() {
  syncTextParas();
  paragraphs.push({ type: 'text', content: '' });
  renderParagraphs();
  setTimeout(() => {
    const last = paragraphs.length - 1;
    const ta = document.getElementById(`para-${last}`);
    if (ta) ta.focus();
  }, 50);
}

function addPhotoParagraph(e) {
  const file = e.target.files[0];
  if (!file) return;
  syncTextParas();
  compressImage(file, b64 => {
    paragraphs.push({ type: 'photo', content: b64 });
    renderParagraphs();
    document.getElementById('para-photo-input').value = '';
  });
}

function replacePhoto(idx) {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    compressImage(file, b64 => {
      paragraphs[idx].content = b64;
      renderParagraphs();
    });
  };
  input.click();
}

function removeParagraph(idx) {
  syncTextParas();
  if (paragraphs.length <= 1 && paragraphs[0].type === 'text') return;
  paragraphs.splice(idx, 1);
  if (paragraphs.length === 0) paragraphs.push({ type: 'text', content: '' });
  renderParagraphs();
}

function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const maxW = 1200;
      let w = img.width, h = img.height;
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function addTag() {
  const input = document.getElementById('f-tag-input');
  const val = input.value.trim();
  if (!val || currentTags.includes(val)) { input.value = ''; return; }
  currentTags.push(val);
  renderFormTags();
  input.value = '';
  input.focus();
}

function removeTag(idx) {
  currentTags.splice(idx, 1);
  renderFormTags();
}

function renderFormTags() {
  document.getElementById('tags-list').innerHTML = currentTags.map((t,i) =>
    `<div class="tag-item">${t}<span class="tag-remove" onclick="removeTag(${i})">×</span></div>`
  ).join('');
}

async function saveDiary() {
  const date = document.getElementById('f-date').value;
  const person = document.getElementById('f-person').value.trim();
  if (!date || !person) { showToast('请填写日期和对方昵称'); return; }
  syncTextParas();
  const filtered = paragraphs.filter(p => p.content && p.content.trim());
  const isEdit = !!editingId;
  // preserve original createdAt if editing
  const existing = isEdit ? await dbGet(editingId) : null;
  const entry = {
    id: isEdit ? editingId : Date.now().toString(),
    date,
    location: document.getElementById('f-location').value.trim(),
    person,
    mood: parseInt(document.getElementById('f-mood').value),
    paragraphs: filtered,
    body: filtered.filter(p => p.type === 'text').map(p => p.content).join('\n\n'),
    photo: (filtered.find(p => p.type === 'photo') || {}).content || null,
    tags: [...currentTags],
    createdAt: existing ? existing.createdAt : Date.now(),
    updatedAt: Date.now()
  };
  await dbPut(entry);
  editingId = null;
  showToast(isEdit ? '已更新 ✓' : '已保存 ✓');

    currentId = entry.id;
    await openDetail(entry.id);
  } else {
    showView('list');
  }
}

// ── DETAIL ──
async function openDetail(id) {
  const entry = await dbGet(id);
  if (!entry) { showToast('记录不存在'); return; }
  currentId = id;
  document.getElementById('d-header-person').textContent = entry.person;
  document.getElementById('d-header-date').textContent = entry.date;
  document.getElementById('d-person').textContent = entry.person;
  document.getElementById('d-date').textContent = `📅 ${entry.date}`;
  document.getElementById('d-location').textContent = entry.location ? `📍 ${entry.location}` : '';
  document.getElementById('d-mood').textContent = `${moodEmoji(entry.mood)} 心情指数 ${entry.mood}/5`;

  // render mixed paragraphs
  let paras = entry.paragraphs && entry.paragraphs.length ? entry.paragraphs : null;
  // legacy compat: old entries stored body as string
  if (!paras) {
    paras = [];
    if (entry.photo) paras.push({ type: 'photo', content: entry.photo });
    if (entry.body) paras.push({ type: 'text', content: entry.body });
    if (!paras.length) paras.push({ type: 'text', content: '（没有正文）' });
  }
  document.getElementById('d-body-container').innerHTML = paras.map(p =>
    p.type === 'photo'
      ? `<img class="detail-para-photo" src="${p.content}" alt="">`
      : `<div class="detail-para">${escHtml(p.content)}</div>`
  ).join('');

  document.getElementById('d-tags').innerHTML = entry.tags&&entry.tags.length
    ? entry.tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('') : '';
  showView('detail');
}

// ── EDIT ──
async function openEdit() {
  if (!currentId) return;
  const entry = await dbGet(currentId);
  if (!entry) { showToast('记录不存在'); return; }

  editingId = currentId;

  // set form to edit mode header
  document.getElementById('form-title').textContent = '编辑记录';

  // populate form fields
  initForm(); // resets paragraphs etc
  document.getElementById('f-date').value = entry.date;
  document.getElementById('f-location').value = entry.location || '';
  document.getElementById('f-person').value = entry.person;
  document.getElementById('f-mood').value = entry.mood;
  document.getElementById('mood-val').textContent = entry.mood;

  // restore tags
  currentTags = entry.tags ? [...entry.tags] : [];
  renderFormTags();

  // restore paragraphs
  let paras = entry.paragraphs && entry.paragraphs.length ? entry.paragraphs : null;
  if (!paras) {
    paras = [];
    if (entry.photo) paras.push({ type: 'photo', content: entry.photo });
    if (entry.body) paras.push({ type: 'text', content: entry.body });
    if (!paras.length) paras.push({ type: 'text', content: '' });
  }
  paragraphs = paras.map(p => ({ ...p })); // deep copy
  renderParagraphs();

  // show form view without calling initForm again
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-form').classList.add('active');

// ── EXPORT (iOS compatible) ──
async function exportImage() {
  if (!currentId) return;
  const entry = await dbGet(currentId);
  if (!entry) { showToast('记录不存在'); return; }

  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

  // iOS: open the window IMMEDIATELY inside the click handler
  // before any async work, otherwise Safari blocks the popup
  let iosWin = null;
  if (isIOS) {
    iosWin = window.open('', '_blank');
    if (iosWin) {
      iosWin.document.write(`
        <html><head><meta name="viewport" content="width=device-width,initial-scale=1">
        <title>私语长图</title>
        <style>
          body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}
          .hint{color:#888;font-size:14px;margin-top:16px;text-align:center;padding:0 20px;line-height:1.6}
          .loading{color:#666;font-size:13px;margin-top:40px}
        </style></head><body>
        <div class="loading">⏳ 正在生成长图...</div>
        </body></html>`);
      iosWin.document.close();
    } else {
      showToast('请在 Safari 设置中允许弹出窗口');
      return;
    }
  }

  // fill export canvas header
  document.getElementById('ec-person').textContent = entry.person;
  document.getElementById('ec-date').textContent = `📅 ${entry.date}`;
  document.getElementById('ec-location').textContent = entry.location ? `📍 ${entry.location}` : '';
  document.getElementById('ec-mood-fill').style.width = (entry.mood / 5 * 100) + '%';
  document.getElementById('ec-mood-num').textContent = `${entry.mood}/5`;
  document.getElementById('ec-footer-date').textContent = entry.date;
  document.getElementById('ec-tags').innerHTML = entry.tags&&entry.tags.length
    ? entry.tags.map(t=>`<span class="ec-tag">${escHtml(t)}</span>`).join('') : '';

  // render mixed paragraphs into export canvas
  let paras = entry.paragraphs && entry.paragraphs.length ? entry.paragraphs : null;
  if (!paras) {
    paras = [];
    if (entry.photo) paras.push({ type: 'photo', content: entry.photo });
    if (entry.body) paras.push({ type: 'text', content: entry.body });
  }

  const bodyContainer = document.getElementById('ec-body-container');
  bodyContainer.innerHTML = '';

  const imageLoadPromises = [];
  paras.forEach(p => {
    if (p.type === 'photo' && p.content) {
      const img = document.createElement('img');
      img.className = 'ec-photo';
      img.src = p.content;
      img.alt = '';
      bodyContainer.appendChild(img);
      imageLoadPromises.push(new Promise(r => { img.onload = r; img.onerror = r; }));
    } else if (p.type === 'text' && p.content) {
      const div = document.createElement('div');
      div.className = 'ec-body';
      div.textContent = p.content;
      bodyContainer.appendChild(div);
    }
  });

  await Promise.all(imageLoadPromises);
  document.getElementById('loading').classList.add('show');

  try {
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 400));

    const el = document.getElementById('export-canvas');
    const bgColor = currentTheme === 'day' ? '#ffffff' : '#0d0d14';

    const canvas = await html2canvas(el, {
      backgroundColor: bgColor,
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: 750,
      windowWidth: 900,
    });

    const dataURL = canvas.toDataURL('image/png');

    if (isIOS) {
      if (iosWin && !iosWin.closed) {
        // write the actual image into the already-open window
        iosWin.document.open();
        iosWin.document.write(`
          <html><head><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>私语长图 · ${escHtml(entry.person)}</title>
          <style>
            body{margin:0;background:#111;display:flex;flex-direction:column;align-items:center;padding:20px;gap:0;font-family:sans-serif}
            img{max-width:100%;border-radius:8px;display:block}
            .hint{color:#888;font-size:13px;margin-top:14px;text-align:center;line-height:1.7;padding:0 16px}
            .close-btn{margin-top:20px;padding:12px 40px;background:#333;color:#ccc;border:1px solid #444;border-radius:30px;font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
            .close-btn:active{opacity:0.7}
          </style></head><body>
          <img src="${dataURL}" alt="私语长图">
          <p class="hint">长按图片 → 存储到照片</p>
          <button class="close-btn" onclick="window.close()">关闭</button>
          </body></html>`);
        iosWin.document.close();
        showToast('长按图片保存到相册 ✓');
      }
    } else {
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = `私语_${entry.person}_${entry.date}.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast('长图已下载 ✓');
    }
  } catch(err) {
    console.error('Export error:', err);
    if (iosWin && !iosWin.closed) iosWin.close();
    showToast('生成失败，请重试');
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

// ── UTILS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

    if (p.type === 'text') {
      const ta = document.getElementById(`para-${i}`);
      if (ta) p.content = ta.value;
    }
  });

  const ta = document.getElementById(`para-${idx}`);
  const currentText = paragraphs[idx] ? paragraphs[idx].content || '' : '';
  const person = document.getElementById('f-person').value.trim();
  const date = document.getElementById('f-date').value;
  const location = document.getElementById('f-location').value.trim();
  const mood = document.getElementById('f-mood').value;
  const moodMap = {'1':'很差','2':'一般','3':'还好','4':'不错','5':'很好'};
  const tags = currentTags.length ? currentTags.join('、') : '无';

  const btn = document.getElementById(`ai-btn-${idx}`);
  btn.classList.add('loading');
  btn.disabled = true;

  // context: text paragraphs before this one
  const prevParas = paragraphs.slice(0, idx).filter(p => p.type === 'text' && p.content.trim()).map(p => p.content);

  const style = getCurrentStyle();

  const systemPrompt = `你是一个私密约会日记续写助手。请用第一人称、自然流畅的中文续写当前段落。
严格要求：
- 续写内容不超过50字（含标点），这是硬性限制
- 以标签为情境背景，融入标签描述的氛围和感受
- 直接续写正文，不加任何前缀、标题或说明
- 不重复已有内容
- 【重要】「对方」字段填写的是用户给约会对象起的代号（可能是水果、动物、颜色等任何词），不是真实姓名，更不是字面意思。请把它当作人名代号处理，不要根据这个词联想相关事物或场景（例如代号是「芒果」，不要写吃芒果；代号是「小熊」，不要写熊或森林）。
${style.prompt}`;

  const userContent = `【日记背景】
日期：${date}　地点：${location || '未填写'}　对方：${person || '未填写'}　心情：${moodMap[mood] || mood}
标签（情境关键词）：${tags}

${prevParas.length ? `【前面段落】\n${prevParas.join('\n\n')}\n\n` : ''}【当前段落已写】
${currentText || '（空白，请帮我写开头）'}

请续写当前段落（不超过50字）：`;

  try {
    const provider = getCurrentProvider();
    const model = localStorage.getItem(`siyu_model_${provider.id}`) || provider.defaultModel;
    const req = provider.buildRequest(apiKey, model, systemPrompt, userContent);

    const resp = await fetch(req.url, {
      method: 'POST',
      headers: req.headers,
      body: JSON.stringify(req.body)
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      const status = resp.status;
      const msg = err.error?.message || err.message || '';
      if (status === 401 || status === 403) { showToast('API Key 无效，请检查'); return; }
      if (status === 429 || msg.includes('RESOURCE_EXHAUSTED') || msg.includes('rate') || msg.includes('quota')) {
        showToast('额度已用完，请换模型或明天再试'); return;
      }
      if (status === 404 || msg.includes('not found') || msg.includes('does not exist')) {
        showToast('模型名称有误，请在设置中修改'); return;
      }
      throw new Error(msg || `HTTP ${status}`);
    }

    const data = await resp.json();
    let continuation = req.extractText(data).trim();
    if (!continuation) { showToast('AI 没有返回内容，请重试'); return; }

    // hard-trim to 50 chars if model exceeded
    if (countChars(continuation) > 50) {
      let count = 0, cutAt = continuation.length;
      for (let i = 0; i < continuation.length; i++) {
        if (!/\s/.test(continuation[i])) count++;
        if (count >= 50) { cutAt = i + 1; break; }
      }
      continuation = continuation.slice(0, cutAt);
    }

    const sep = currentText && !currentText.endsWith('\n') ? '' : '';
    ta.value = currentText + continuation;
    paragraphs[idx].content = ta.value;
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';

    // update char count
    const cc = document.getElementById(`char-${idx}`);
    const n = countChars(ta.value);
    cc.textContent = `${n} 字`;
    cc.className = 'para-char-count' + (n > 50 ? ' over' : '');

    showToast('续写完成 ✓');
  } catch(err) {
    console.error('AI error:', err);
    showToast('续写失败：' + (err.message || '请检查网络'));
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ── INIT ──
openDB().then(() => { renderList(); loadApiKeyStatus(); renderStyleGrid(); }).catch(err => {
  console.error('DB error:', err);
  showToast('数据库初始化失败');
});
</script>
</body>
</html>
